# MeetUp — TLS-терминатор перед приложением.
# Одна точка входа для браузера:
#   https://<ip>/    — статика веб-клиента  → app:80
#   wss://<ip>/ws    — WebSocket-relay      → app:9000
#
# Всё намеренно на одном порту 443: исключение для самоподписанного
# сертификата браузер принимает на конкретный host:port, и wss на
# отдельном порту молча не работал бы (особенно в Firefox).

# HTTP оставлен только для редиректа на https.
server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;

    # Самоподписанный сертификат; генерируется при первом старте
    # (см. 10-gen-cert.sh) и живёт в томе certs.
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Запас под будущие загрузки (аватары, картинки в чат) через HTTP API.
    client_max_body_size 20m;

    # Веб-клиент (статика приложения).
    location / {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
    }

    # WebSocket-relay. Заголовки Upgrade/Connection обязательны, иначе
    # nginx не пропустит смену протокола. Таймауты подняты с дефолтных
    # 60 секунд: чат может долго молчать, а рвать соединение нельзя.
    location /ws {
        proxy_pass http://app:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
