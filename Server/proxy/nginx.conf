# MeetUp — TLS-терминатор перед приложением.
# Одна точка входа для браузера:
#   https://<ip>/    — статика веб-клиента  → app:80
#   wss://<ip>/ws    — WebSocket-relay      → app:9000
#
# Всё намеренно на одном порту 443: исключение для самоподписанного
# сертификата браузер принимает на конкретный host:port, и wss на
# отдельном порту молча не работал бы (особенно в Firefox).

# HTTP: отдаёт ACME-challenge для Let's Encrypt, остальное — редирект на https.
server {
    listen 80;

    # HTTP-01 challenge должен отдаваться по http без редиректа, иначе
    # certbot не подтвердит домен. Файлы кладёт certbot в этот webroot
    # (см. 20-certbot.sh / 30-renew-loop.sh). В режиме без домена location
    # просто ничего не отдаёт — вреда нет.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;

    # Стабильные пути. Реальные файлы под live/ подкладывает entrypoint ДО
    # старта nginx: без домена — самоподписанный, с доменом — Let's Encrypt
    # (см. 10-gen-cert.sh / 20-certbot.sh). Сам конфиг про режим не знает.
    ssl_certificate     /etc/nginx/certs/live/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/privkey.pem;

    # Запас под будущие загрузки (аватары, картинки в чат) через HTTP API.
    client_max_body_size 20m;

    # Веб-клиент (статика приложения).
    location / {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
    }

    # WebSocket-relay. Заголовки Upgrade/Connection обязательны, иначе
    # nginx не пропустит смену протокола. Таймауты подняты с дефолтных
    # 60 секунд: чат может долго молчать, а рвать соединение нельзя.
    location /ws {
        proxy_pass http://app:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
