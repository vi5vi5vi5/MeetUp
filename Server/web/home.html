<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MeetUp — Главная</title>
<link rel="stylesheet" href="assets/fonts.css">
<link rel="stylesheet" href="assets/theme.css">
<style>
  html, body { height: 100%; margin: 0; }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font-ui);
    font-size: var(--text-md); line-height: var(--leading-base);
    transition: background .24s var(--ease);
  }
  /* Десктоп живёт без скролла: страница ровно в высоту окна, длинные
     списки (история) прокручиваются внутри своих карточек. */
  #root { position: fixed; inset: 0; overflow: hidden; }
  a { color: var(--accent-ink); text-decoration: none; }
  a:hover { opacity: .82; }
  ::selection { background: var(--accent); color: var(--on-accent); }

  .page { height: 100%; display: flex; flex-direction: column; }

  .topbar { display: flex; align-items: center; gap: 14px; padding: 22px 28px; }
  .wordmark { font-family: var(--font-label); font-weight: 700; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; }
  .topbar-actions { display: flex; align-items: center; gap: 12px; }

  .stagewrap { flex: 1; min-height: 0; display: grid; place-items: center; padding: 8px 28px 28px; }
  .stage { display: grid; grid-template-columns: 1.05fr .95fr; gap: 44px; align-items: stretch;
    max-width: 1000px; width: 100%; height: 100%; max-height: 640px; min-height: 0; }

  /* ---- левая половина: приветствие и личная комната одной группой,
     выровненной по центру, — без пустой пропасти между ними ---- */
  .left { display: flex; flex-direction: column; justify-content: center; gap: 36px;
    min-width: 0; min-height: 0; }

  /* ---- hero ---- */
  .hero { display: flex; flex-direction: column; gap: 22px; min-width: 0; }
  .hero-badge { display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
    padding: 6px 12px 6px 6px; border: 1px solid var(--border); border-radius: var(--radius-pill);
    background: var(--surface); }
  .hero-badge .hb-txt { font-family: var(--font-label); text-transform: uppercase; letter-spacing: 2px; font-size: 11px; color: var(--text-muted); }
  .greet-label { font-family: var(--font-label); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-faint); }
  .greet-title { margin: 8px 0 0; font-family: var(--font-display); font-weight: 800;
    font-size: clamp(36px, 5vw, 54px); line-height: .95; letter-spacing: -1.8px;
    min-width: 0; overflow-wrap: anywhere;
    /* длинное имя не должно распирать левую колонку — максимум две строки */
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .greet-sub { margin-top: 16px; max-width: 380px; color: var(--text-muted); font-size: 15px; }

  .col { display: flex; flex-direction: column; gap: 20px; min-width: 0; min-height: 0; }
  .card-title { font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: -.5px; margin: 0; }
  .room-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .actions-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
  .actions-row > * { flex: 1 1 auto; }
  .room-note { margin-top: 12px; font-size: var(--text-xs); color: var(--text-faint); }

  /* ---- элементы аккаунта и модалок (из дизайна «Главная») ---- */
  .hu-avatar { display: inline-flex; align-items: center; justify-content: center; flex: none;
    border-radius: 50%; background: var(--surface-3); color: var(--text);
    font-family: var(--font-ui); font-weight: 800; overflow: hidden;
    border: 1px solid var(--border); background-size: cover; background-position: center; }
  .hu-textbtn { border: 0; background: transparent; color: var(--accent-ink);
    font-family: var(--font-ui); font-weight: 700; font-size: 12px; cursor: pointer;
    padding: 4px 6px; border-radius: 6px; transition: var(--transition); }
  .hu-textbtn:hover { background: var(--surface-2); }
  .hu-label { font-family: var(--font-label); text-transform: uppercase; letter-spacing: 2px;
    font-size: 11px; color: var(--text-faint); }
  .hu-account { position: relative; }
  .hu-chip { display: inline-flex; align-items: center; gap: 9px; padding: 5px 9px 5px 5px;
    border-radius: var(--radius-pill); border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; color: var(--text); font-family: var(--font-ui); transition: var(--transition); }
  .hu-chip:hover { background: var(--surface-2); }
  .hu-chip-name { font-weight: 700; font-size: 13px; max-width: 150px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .hu-caret { color: var(--text-muted); display: flex; }
  .hu-menu { position: absolute; top: calc(100% + 8px); right: 0; min-width: 230px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    box-shadow: var(--shadow-pop); padding: 6px; z-index: 120; }
  .hu-menu-head { display: flex; align-items: center; gap: 10px; padding: 8px 8px 12px;
    border-bottom: 1px solid var(--border); margin-bottom: 6px; }
  .hu-menu-item { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    padding: 9px 10px; border: 0; background: transparent; border-radius: var(--radius-sm);
    color: var(--text); font-family: var(--font-ui); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: var(--transition); text-decoration: none; }
  .hu-menu-item:hover { background: var(--surface-2); }
  .hu-menu-item.danger { color: var(--danger); }
  .hu-scrim { position: fixed; inset: 0; z-index: 200; background: rgba(6,6,8,.55);
    display: grid; place-items: center; padding: 20px; overflow: auto;
    animation: hu-fade .15s var(--ease); }
  @keyframes hu-fade { from { opacity: 0 } to { opacity: 1 } }
  .hu-link { display: flex; align-items: center; gap: 8px; padding: 8px 8px 8px 12px;
    border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--surface-2); }
  .hu-link-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-family: var(--font-mono); font-size: 12.5px; color: var(--text); }
  .hu-stack { display: inline-flex; }
  .hu-stack .hu-avatar { margin-left: -9px; box-shadow: 0 0 0 2px var(--surface); }
  .hu-stack .hu-avatar:first-child { margin-left: 0; }
  .hu-empty { display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 16px; padding: 36px 24px; border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius-card); background: var(--surface); cursor: pointer; transition: var(--transition); }
  .hu-empty:hover { border-color: var(--accent-ink); background: var(--surface-2); }
  .hu-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
  .hu-divider::before, .hu-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .hu-divider span { font-family: var(--font-label); font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-faint); }

  /* ---- история конференций (localStorage) ---- */
  /* Список прокручивается внутри карточки — страница не растёт. */
  .hist-list { display: flex; flex-direction: column; gap: 2px; margin: 0 -6px;
    overflow-y: auto; min-height: 0; }
  .hist-row { display: flex; align-items: center; gap: 10px; padding: 7px 6px 7px 10px;
    border: 0; background: transparent; width: 100%; text-align: left; cursor: pointer;
    border-radius: var(--radius-md); color: var(--text); font-family: var(--font-ui);
    flex: none; transition: var(--transition); }
  .hist-row:hover { background: var(--surface-2); }
  .hist-code { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; font-family: var(--font-mono); font-size: 13px; }
  .hist-when { flex: none; font-size: 11.5px; color: var(--text-faint); }
  .hist-del { display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; flex: none; border: 0; border-radius: var(--radius-sm);
    background: transparent; color: var(--text-faint); cursor: pointer;
    transition: var(--transition); }
  .hist-del:hover { background: var(--surface-3); color: var(--text); }

  /* ---- Невысокие десктопные окна: ужимаем воздух, скролла всё равно нет ---- */
  @media (min-width: 781px) and (max-height: 760px) {
    .topbar { padding: 14px 28px; }
    .stagewrap { padding: 4px 28px 20px; }
    .stage { gap: 32px; }
    .left, .hero { gap: 16px; }
    .col { gap: 14px; }
    .greet-title { font-size: clamp(30px, 4.6vh, 44px); }
    .greet-sub { margin-top: 10px; font-size: 14px; }
    .hu-divider { margin: 10px 0; }
  }

  /* ---- Mobile: одна колонка, обычный скролл страницы ---- */
  @media (max-width: 780px) {
    #root { overflow: auto; }
    .page { height: auto; min-height: 100%; }
    .topbar { padding: 18px 18px; }
    .stagewrap { padding: 4px 16px 56px; align-items: start; }
    .stage { grid-template-columns: 1fr; gap: 24px; max-width: 460px; height: auto; max-height: none; }
    .left { gap: 24px; }
    .hero { align-items: flex-start; }
    .greet-title { font-size: clamp(30px, 9.5vw, 42px); }
    .greet-sub { max-width: none; }
  }
</style>
</head>
<body>

<div id="root"></div>
<script src="assets/react.js"></script>
<script src="assets/react-dom.js"></script>
<script src="assets/babel.js"></script>
<script src="assets/meetup-ds.js?v=2"></script>
<script src="assets/meetup-common.js"></script>
<script type="text/babel">
  const { useState, useRef, useEffect } = React;
  const { Card, Button, IconButton, Icon, Badge, Input, Field } = window.MeetUpDesignSystem_2584b5;

  // Аватарка хранится на сервере (POST/DELETE /api/me/avatar, файл один на
  // пользователя). Личная комната — тоже на сервере (/api/me/room); старый
  // локальный черновик используется один раз — чтобы заполнить форму создания.
  const THEME_KEY = "meetup.theme";
  const ROOM_KEY = "meetup.room.draft";
  function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
  function lsSet(k, v) {
    try { v == null ? localStorage.removeItem(k) : localStorage.setItem(k, v); } catch (e) {}
  }
  function loadRoomDraft() {
    try { return JSON.parse(lsGet(ROOM_KEY) || "null"); } catch (e) { return null; }
  }

  // URL аватарки: версия в адресе делает кэш вечным (см. сервер).
  function avatarSrc(user) {
    return user && user.avatar_ver > 0
      ? "/api/users/" + user.id + "/avatar?v=" + user.avatar_ver
      : null;
  }

  // Аватарка перед загрузкой: центр-кроп в квадрат и ужатие до 256px JPEG.
  async function fileToAvatarB64(file) {
    let img;
    try {
      img = await createImageBitmap(file);
    } catch (e) {
      const url = URL.createObjectURL(file);
      try {
        img = new Image();
        await new Promise((ok, err) => { img.onload = ok; img.onerror = err; img.src = url; });
      } finally {
        URL.revokeObjectURL(url);
      }
    }
    const w = img.width || img.naturalWidth, h = img.height || img.naturalHeight;
    if (!w || !h) throw new Error("empty image");
    const side = Math.min(w, h);
    const c = document.createElement("canvas");
    c.width = c.height = 256;
    const g = c.getContext("2d");
    g.fillStyle = "#fff";   // прозрачность → белый фон
    g.fillRect(0, 0, 256, 256);
    g.drawImage(img, (w - side) / 2, (h - side) / 2, side, side, 0, 0, 256, 256);
    if (img.close) img.close();
    const dataUrl = c.toDataURL("image/jpeg", 0.85);
    return dataUrl.slice(dataUrl.indexOf(",") + 1);
  }

  // Текст для машинных кодов ошибок /api/me/room.
  function roomErrText(code) {
    return {
      invalid_code: "Код: от 3 до 32 символов — латиница, цифры, «-» и «_».",
      code_taken: "Этот код уже занят другой комнатой.",
      room_exists: "У вас уже есть личная комната.",
      invalid_title: "Название: от 1 до 64 символов.",
      invalid_password: "Пароль слишком длинный (до 128 символов).",
      no_session: "Сессия истекла — войдите заново.",
    }[code] || "Не получилось сохранить. Попробуйте позже.";
  }

  // История конференций: пишет conference.html при входе в комнату
  // (localStorage, ключ meetup.history) — на сервере её нет.
  const HISTORY_KEY = "meetup.history";
  function loadHistory() {
    try {
      const list = JSON.parse(lsGet(HISTORY_KEY) || "[]");
      return Array.isArray(list)
        ? list.filter(e => e && typeof e.code === "string" && e.code)
        : [];
    } catch (e) { return []; }
  }
  // Длительность эфира: мм:сс, после часа — ч:мм:сс.
  function fmtDuration(ms) {
    const s = Math.max(0, Math.floor(ms / 1000));
    const two = (n) => String(n).padStart(2, "0");
    const h = Math.floor(s / 3600);
    const m = Math.floor(s / 60) % 60;
    return (h ? h + ":" + two(m) : two(m)) + ":" + two(s % 60);
  }

  function fmtWhen(ms) {
    const at = Number(ms);
    if (!at) return "";
    const min = Math.floor((Date.now() - at) / 60000);
    if (min < 1) return "только что";
    if (min < 60) return min + " мин назад";
    const h = Math.floor(min / 60);
    if (h < 24) return h + " ч назад";
    return new Date(at).toLocaleDateString("ru-RU", { day: "numeric", month: "long" });
  }

  function initials(name) {
    const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
    if (parts.length === 0) return "?";
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[1][0]).toUpperCase();
  }
  // Код комнаты по правилам сервера: [a-z0-9_-], 3–32 символа.
  function slugify(v) {
    return String(v || "").toLowerCase()
      .replace(/[^a-z0-9_-]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 32);
  }
  function roomLinkText(code) { return location.host + "/conference.html?room=" + (code || ""); }
  function roomLinkFull(code) { return location.origin + "/conference.html?room=" + encodeURIComponent(code || ""); }

  function Avatar({ size = 40, name, src, style }) {
    const st = { width: size, height: size, fontSize: Math.round(size * 0.4), ...style };
    if (src) st.backgroundImage = 'url("' + src + '")';
    return <span className="hu-avatar" style={st}>{src ? null : initials(name)}</span>;
  }

  function Modal({ open, onClose, title, subtitle, width = 460, children }) {
    useEffect(() => {
      if (!open) return;
      const onKey = (e) => { if (e.key === "Escape") onClose(); };
      window.addEventListener("keydown", onKey);
      return () => window.removeEventListener("keydown", onKey);
    }, [open, onClose]);
    if (!open) return null;
    return (
      <div className="hu-scrim" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
        <Card elevated width={width} style={{ maxWidth: "100%", maxHeight: "calc(100vh - 40px)", overflowY: "auto" }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, marginBottom: 14 }}>
            <div>
              {title && <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 20, letterSpacing: "-.5px" }}>{title}</div>}
              {subtitle && <div style={{ color: "var(--text-muted)", fontSize: 13, marginTop: 4 }}>{subtitle}</div>}
            </div>
            <IconButton icon="x" size="sm" label="Закрыть" onClick={onClose} />
          </div>
          {children}
        </Card>
      </div>
    );
  }

  function AccountMenu({ name, avatar, theme, onEditProfile, onToggleTheme, onLogout }) {
    const [open, setOpen] = useState(false);
    const ref = useRef(null);
    useEffect(() => {
      if (!open) return;
      const onDown = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
      const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
      document.addEventListener("mousedown", onDown);
      window.addEventListener("keydown", onKey);
      return () => { document.removeEventListener("mousedown", onDown); window.removeEventListener("keydown", onKey); };
    }, [open]);
    return (
      <div className="hu-account" ref={ref}>
        <button className="hu-chip" onClick={() => setOpen(o => !o)} aria-haspopup="menu">
          <Avatar size={30} name={name} src={avatar} />
          <span className="hu-chip-name">{name}</span>
          <span className="hu-caret"><Icon name="more" size={16} /></span>
        </button>
        {open && (
          <div className="hu-menu" role="menu">
            <div className="hu-menu-head">
              <Avatar size={38} name={name} src={avatar} />
              <div style={{ minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{name}</div>
                <div style={{ fontSize: 11, color: "var(--text-muted)" }}>Ваш аккаунт</div>
              </div>
            </div>
            <button className="hu-menu-item" onClick={() => { setOpen(false); onEditProfile(); }}>
              <Icon name="settings" size={16} /> Настройки профиля
            </button>
            <button className="hu-menu-item" onClick={onToggleTheme}>
              <Icon name={theme === "dark" ? "sun" : "moon"} size={16} /> {theme === "dark" ? "Светлая тема" : "Тёмная тема"}
            </button>
            <div style={{ height: 1, background: "var(--border)", margin: "6px 4px" }} />
            <button className="hu-menu-item danger" onClick={onLogout}>
              <Icon name="arrow-right" size={16} /> Выйти
            </button>
          </div>
        )}
      </div>
    );
  }

  function AvatarEditor({ name, avatar, onChange }) {
    const inputRef = useRef(null);
    const [busy, setBusy] = useState(false);
    async function apply(fileOrNull) {
      setBusy(true);
      try { await onChange(fileOrNull); } finally { setBusy(false); }
    }
    function onFile(e) {
      const f = e.target.files && e.target.files[0];
      e.target.value = "";
      if (f) apply(f);
    }
    return (
      <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
        <Avatar size={88} name={name} src={avatar} />
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          <input ref={inputRef} type="file" accept="image/*" onChange={onFile} style={{ display: "none" }} />
          <div style={{ display: "flex", gap: 8 }}>
            <Button variant={avatar ? "secondary" : "primary"} size="sm" disabled={busy}
                    icon={avatar ? undefined : "plus"} onClick={() => inputRef.current && inputRef.current.click()}>
              {avatar ? "Заменить" : "Загрузить фото"}
            </Button>
            {avatar && <Button variant="ghost" size="sm" icon="x" disabled={busy}
                               onClick={() => apply(null)}>Удалить</Button>}
          </div>
          <span style={{ fontSize: 11, color: "var(--text-faint)" }}>
            PNG или JPG · видна другим участникам конференции
          </span>
        </div>
      </div>
    );
  }

  function NameField({ name, onSave }) {
    const [editing, setEditing] = useState(false);
    const [val, setVal] = useState(name);
    const [busy, setBusy] = useState(false);
    const [err, setErr] = useState("");
    useEffect(() => { if (!editing) setVal(name); }, [name, editing]);
    async function save() {
      const v = val.trim();
      if (!v) { setErr("Имя не может быть пустым."); return; }
      setBusy(true);
      const ok = await onSave(v);
      setBusy(false);
      if (ok) { setEditing(false); setErr(""); }
      else setErr("Не удалось сохранить имя. Попробуйте позже.");
    }
    if (editing) {
      return (
        <div>
          <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
            <Field label="Отображаемое имя" htmlFor="hu-name" style={{ flex: 1 }}>
              <Input id="hu-name" value={val} autoFocus maxLength={40}
                     onChange={(e) => { setVal(e.target.value); setErr(""); }}
                     onKeyDown={(e) => { if (e.key === "Enter") save(); if (e.key === "Escape") setEditing(false); }} />
            </Field>
            <Button variant="primary" icon="check" disabled={busy} onClick={save}>Сохранить</Button>
          </div>
          {err && <div style={{ marginTop: 8, fontSize: 12, color: "var(--danger)" }}>{err}</div>}
        </div>
      );
    }
    return (
      <div>
        <div className="hu-label" style={{ marginBottom: 4 }}>Отображаемое имя</div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 22, letterSpacing: "-.5px" }}>{name}</span>
          <button className="hu-textbtn" onClick={() => setEditing(true)}>Изменить</button>
        </div>
      </div>
    );
  }

  function LinkRow({ code }) {
    const [copied, setCopied] = useState(false);
    function copy() {
      try { navigator.clipboard && navigator.clipboard.writeText(roomLinkFull(code)); } catch (e) {}
      setCopied(true);
      setTimeout(() => setCopied(false), 1400);
    }
    return (
      <div className="hu-link">
        <span className="hu-link-text" title={roomLinkText(code)}>{roomLinkText(code)}</span>
        <IconButton icon={copied ? "check" : "copy"} size="sm" variant={copied ? "active" : "neutral"}
                    label="Копировать ссылку" onClick={copy} />
      </div>
    );
  }

  // Стопка аватарок-инициалов: владелец с главной видит, кто сейчас в комнате.
  function ParticipantsStack({ names, max = 4 }) {
    const shown = names.slice(0, max);
    const extra = names.length - shown.length;
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div className="hu-stack">
          {shown.map((n, i) => <Avatar key={i} size={30} name={n} />)}
        </div>
        {extra > 0 && <span style={{ fontSize: 12, color: "var(--text-muted)", fontWeight: 600 }}>+{extra}</span>}
      </div>
    );
  }

  // Бейдж «в эфире · 05:32» — длительность тикает раз в секунду.
  function LiveDuration({ sinceMs }) {
    const [now, setNow] = useState(Date.now());
    useEffect(() => {
      const id = setInterval(() => setNow(Date.now()), 1000);
      return () => clearInterval(id);
    }, []);
    return <Badge tone="live" dot>{"в эфире · " + fmtDuration(now - sinceMs)}</Badge>;
  }

  function EmptyRoom({ onCreate }) {
    return (
      <div className="hu-empty" onClick={onCreate} role="button" tabIndex={0}
           onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onCreate(); } }}>
        <IconButton icon="plus" variant="accent" size="lg" label="Создать личную комнату" onClick={onCreate} />
        <div>
          <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 20, letterSpacing: "-.5px" }}>Создайте личную комнату</div>
          <div style={{ color: "var(--text-muted)", fontSize: 13, marginTop: 6, maxWidth: 340, marginLeft: "auto", marginRight: "auto" }}>
            Постоянная комната с вашей собственной ссылкой — поделитесь ей один раз и встречайтесь всегда по ней.
          </div>
        </div>
      </div>
    );
  }

  function CreateRoomModal({ open, onClose, userName, onCreate }) {
    const [code, setCode] = useState("");
    const [title, setTitle] = useState("");
    const [pass, setPass] = useState("");
    const [showPass, setShowPass] = useState(false);
    const [err, setErr] = useState("");
    const [busy, setBusy] = useState(false);
    useEffect(() => {
      if (!open) return;
      // Старый локальный черновик комнаты (до серверной части) — в форму,
      // чтобы не набирать заново; после создания он стирается.
      const draft = loadRoomDraft() || {};
      setCode(draft.code || "");
      setTitle(draft.title || "");
      setPass(draft.password || "");
      setShowPass(false); setErr(""); setBusy(false);
    }, [open]);
    async function create() {
      const c = slugify(code);
      if (c.length < 3) { setErr(roomErrText("invalid_code")); return; }
      setBusy(true);
      const e = await onCreate({ code: c, title: title.trim() || ("Комната " + userName), password: pass });
      setBusy(false);
      if (e) { setErr(roomErrText(e)); return; }
      lsSet(ROOM_KEY, null);
      onClose();
    }
    return (
      <Modal open={open} onClose={onClose} title="Новая личная комната"
             subtitle="Постоянная комната с вашей собственной ссылкой." width={470}>
        <Field label="Код комнаты (ссылка)" htmlFor="cr-code" hint={roomLinkText(slugify(code) || "…")}>
          <Input id="cr-code" value={code} placeholder="anna-room" autoFocus
                 onChange={(e) => { setCode(e.target.value); setErr(""); }}
                 onKeyDown={(e) => e.key === "Enter" && create()} />
        </Field>
        <Field label="Название конференции" htmlFor="cr-title" style={{ marginTop: 16 }}>
          <Input id="cr-title" value={title} placeholder={"Комната " + userName}
                 onChange={(e) => setTitle(e.target.value)} />
        </Field>
        <Field label="Пароль (необязательно)" htmlFor="cr-pass" style={{ marginTop: 16 }}
               hint="Оставьте пустым — вход без пароля.">
          <div style={{ display: "flex", gap: 8 }}>
            <Input id="cr-pass" type={showPass ? "text" : "password"} value={pass} placeholder="••••••"
                   style={{ flex: 1 }} onChange={(e) => setPass(e.target.value)} />
            <Button variant="secondary" onClick={() => setShowPass(v => !v)}>{showPass ? "Скрыть" : "Показать"}</Button>
          </div>
        </Field>
        <Button variant="primary" block iconRight="arrow-right" style={{ marginTop: 22 }}
                disabled={busy} onClick={create}>
          Создать комнату
        </Button>
        <div style={{ marginTop: 12, textAlign: "center", fontSize: 12, color: err ? "var(--danger)" : "var(--text-faint)" }}>
          {err || "Комната сохраняется на сервере — ссылка заработает сразу."}
        </div>
      </Modal>
    );
  }

  function RoomSettingsModal({ open, onClose, room, onChange, onDelete }) {
    const [title, setTitle] = useState(room ? room.title : "");
    const [code, setCode] = useState(room ? room.code : "");
    const [pass, setPass] = useState("");
    const [showPass, setShowPass] = useState(false);
    const [editingPass, setEditingPass] = useState(false);
    const [confirmDel, setConfirmDel] = useState(false);
    const [err, setErr] = useState("");
    useEffect(() => {
      if (open && room) {
        setTitle(room.title); setCode(room.code); setPass("");
        setShowPass(false); setEditingPass(false); setConfirmDel(false); setErr("");
      }
    }, [open]);
    if (!room) return null;
    const hasPass = !!room.password;
    const live = !!room.online;
    // Каждое поле сохраняется отдельным PATCH; ошибка сервера — под формой.
    async function apply(patch) {
      const e = await onChange(patch);
      setErr(e ? roomErrText(e) : "");
      return !e;
    }
    function saveTitle() { const t = title.trim(); if (t && t !== room.title) apply({ title: t }); }
    function saveCode() {
      const c = slugify(code);
      if (!c || c === room.code) { setCode(room.code); return; }
      apply({ code: c }).then(ok => { if (!ok) setCode(room.code); });
    }
    async function savePass() {
      if (await apply({ password: pass })) { setEditingPass(false); setPass(""); setShowPass(false); }
    }
    return (
      <Modal open={open} onClose={onClose} title="Настройки комнаты"
             subtitle="Ссылка, название и пароль для подключения." width={470}>
        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          {live ? (
            <div>
              <div className="hu-label" style={{ marginBottom: 8 }}>Ссылка для подключения</div>
              <LinkRow code={room.code} />
              <div style={{ fontSize: 12, color: "var(--text-faint)", marginTop: 8 }}>
                Ссылку нельзя изменить, пока идёт конференция.
              </div>
            </div>
          ) : (
            <Field label="Ссылка для подключения" htmlFor="rs-code" hint={roomLinkText(slugify(code) || "…")}>
              <Input id="rs-code" value={code} onChange={(e) => setCode(e.target.value)}
                     onBlur={saveCode} onKeyDown={(e) => e.key === "Enter" && saveCode()} />
            </Field>
          )}
          <Field label="Название конференции" htmlFor="rs-title">
            <div style={{ display: "flex", gap: 8 }}>
              <Input id="rs-title" value={title} style={{ flex: 1, minWidth: 0 }}
                     onChange={(e) => setTitle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && saveTitle()} />
              <Button variant="secondary" icon="check" onClick={saveTitle}>Сохранить</Button>
            </div>
          </Field>
          <div>
            <div className="hu-label" style={{ marginBottom: 8 }}>Пароль на вход</div>
            {!editingPass ? (
              <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                {hasPass ? (
                  <React.Fragment>
                    <span style={{ fontFamily: "var(--font-mono)", fontSize: 14, letterSpacing: "2px" }}>
                      {showPass ? room.password : "••••••"}
                    </span>
                    <button className="hu-textbtn" onClick={() => setShowPass(v => !v)}>{showPass ? "Скрыть" : "Показать"}</button>
                    <span style={{ flex: 1 }} />
                    <Button variant="secondary" size="sm" onClick={() => { setEditingPass(true); setPass(room.password); }}>Изменить</Button>
                    <Button variant="ghost" size="sm" icon="x" onClick={() => apply({ password: "" })}>Удалить</Button>
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <span style={{ fontSize: 13, color: "var(--text-muted)", flex: 1, minWidth: 140 }}>
                      Пароль не установлен — вход свободный.
                    </span>
                    <Button variant="secondary" size="sm" icon="plus" onClick={() => { setEditingPass(true); setPass(""); }}>Добавить пароль</Button>
                  </React.Fragment>
                )}
              </div>
            ) : (
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <Input type={showPass ? "text" : "password"} value={pass} placeholder="Новый пароль" autoFocus
                       style={{ flex: 1, minWidth: 140 }}
                       onChange={(e) => setPass(e.target.value)} onKeyDown={(e) => e.key === "Enter" && savePass()} />
                <Button variant="secondary" size="sm" onClick={() => setShowPass(v => !v)}>{showPass ? "Скрыть" : "Показать"}</Button>
                <Button variant="primary" size="sm" icon="check" onClick={savePass}>ОК</Button>
              </div>
            )}
          </div>
          {err && <div style={{ fontSize: 12, color: "var(--danger)" }}>{err}</div>}
          <div style={{ borderTop: "1px solid var(--border)", paddingTop: 14,
                        display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
            <span style={{ fontSize: 13, color: "var(--text-muted)", flex: 1, minWidth: 140 }}>
              {confirmDel ? "Точно удалить? Ссылка перестанет работать." : "Комната больше не нужна?"}
            </span>
            {confirmDel
              ? <React.Fragment>
                  <Button variant="secondary" size="sm" onClick={() => setConfirmDel(false)}>Отмена</Button>
                  <Button variant="danger" size="sm" icon="x" onClick={onDelete}>Да, удалить</Button>
                </React.Fragment>
              : <Button variant="ghost" size="sm" icon="x" onClick={() => setConfirmDel(true)}>Удалить комнату</Button>}
          </div>
        </div>
      </Modal>
    );
  }

  // Вход в чужую комнату по коду и новая конференция — существующее API,
  // та же логика, что в анонимном лобби.
  function QuickActions() {
    const [code, setCode] = useState("");
    const [err, setErr] = useState("");
    const [busy, setBusy] = useState(false);
    async function join() {
      const c = code.trim();
      if (!c) { setErr("Введите код комнаты."); return; }
      setErr("");
      setBusy(true);
      const resp = await MeetUp.api("GET", "/api/rooms/" + encodeURIComponent(c));
      if (resp.ok) { location.href = "conference.html?room=" + encodeURIComponent(c); return; }
      setBusy(false);
      if (resp.status === 404) setErr("Комната не найдена. Проверьте код.");
      else setErr("Сервер недоступен. Попробуйте позже.");
    }
    async function createConf() {
      setErr("");
      setBusy(true);
      const resp = await MeetUp.api("POST", "/api/rooms");
      if (resp.ok && resp.body && resp.body.room) {
        location.href = "conference.html?room=" + encodeURIComponent(resp.body.room);
        return;
      }
      setBusy(false);
      setErr("Не удалось создать комнату. Попробуйте позже.");
    }
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <Field label="Код чужой комнаты" htmlFor="qa-code" hint="Спросите код у организатора">
          <Input id="qa-code" value={code} placeholder="Например: fRt7…" autoComplete="off" maxLength={64}
                 onChange={(e) => { setCode(e.target.value); setErr(""); }}
                 onKeyDown={(e) => e.key === "Enter" && join()} />
        </Field>
        <Button variant="primary" block iconRight="arrow-right" disabled={busy} onClick={join}>Подключиться</Button>
        <div className="hu-divider"><span>или</span></div>
        <Button variant="ghost" block icon="plus" disabled={busy} onClick={createConf}>Создать конференцию</Button>
        <div style={{ textAlign: "center", fontSize: 12, color: err ? "var(--danger)" : "var(--text-faint)" }}>
          {err || "Код новой конференции сгенерирует сервер."}
        </div>
      </div>
    );
  }

  // Недавние конференции из истории браузера: клик — снова в комнату.
  function HistoryCard() {
    const [items, setItems] = useState(loadHistory);

    // Вход в комнату в другой вкладке дописывает историю — обновляемся,
    // когда пользователь возвращается на главную.
    useEffect(() => {
      const upd = () => setItems(loadHistory());
      window.addEventListener("focus", upd);
      window.addEventListener("storage", upd);
      return () => {
        window.removeEventListener("focus", upd);
        window.removeEventListener("storage", upd);
      };
    }, []);

    function save(list) {
      setItems(list);
      lsSet(HISTORY_KEY, list.length ? JSON.stringify(list) : null);
    }

    if (!items.length) return null;
    return (
      <Card style={{ display: "flex", flexDirection: "column", minHeight: 0, overflow: "hidden" }}>
        <div className="room-head" style={{ flex: "none" }}>
          <h2 className="card-title">Недавние конференции</h2>
          <button className="hu-textbtn" onClick={() => save([])}>Очистить</button>
        </div>
        <div className="hist-list">
          {items.map(e => {
            const join = () => { location.href = "conference.html?room=" + encodeURIComponent(e.code); };
            return (
              <div key={e.code} className="hist-row" role="button" tabIndex={0}
                   title={"Подключиться к " + e.code} onClick={join}
                   onKeyDown={(ev) => { if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); join(); } }}>
                <Icon name="video" size={16} style={{ color: "var(--text-muted)" }} />
                <span className="hist-code" title={e.code}>{e.title || e.code}</span>
                <span className="hist-when">{fmtWhen(e.at)}</span>
                <button className="hist-del" title="Убрать из истории"
                        aria-label={"Убрать " + e.code + " из истории"}
                        onClick={(ev) => { ev.stopPropagation(); save(items.filter(x => x.code !== e.code)); }}>
                  <Icon name="x" size={14} />
                </button>
              </div>
            );
          })}
        </div>
      </Card>
    );
  }

  function HomeScreen() {
    const [user, setUser] = useState(null);
    const [theme, setTheme] = useState(lsGet(THEME_KEY) === "light" ? "light" : "dark");
    const [room, setRoom] = useState(null);   // личная комната с сервера
    const [profileOpen, setProfileOpen] = useState(false);
    const [createOpen, setCreateOpen] = useState(false);
    const [roomSetOpen, setRoomSetOpen] = useState(false);

    useEffect(() => {
      document.documentElement.setAttribute("data-theme", theme);
      lsSet(THEME_KEY, theme);
    }, [theme]);
    const toggleTheme = () => setTheme(t => (t === "dark" ? "light" : "dark"));

    // Страница только для вошедших: нет сессии — на логин. Личная комната
    // подгружается до первого рендера, чтобы карточка не мигала.
    useEffect(() => {
      MeetUp.authMe().then(async resp => {
        if (resp.ok && resp.body && resp.body.user) {
          const r = await MeetUp.myRoom();
          if (r.ok && r.body && r.body.room) setRoom(r.body.room);
          setUser(resp.body.user);
          MeetUp.saveName(resp.body.user.display_name);
          lsSet("meetup.avatar", null);   // старый локальный черновик больше не нужен
        } else {
          location.replace("login.html");
        }
      });
    }, []);

    // Владелец с главной наблюдает за комнатой: участники и статус эфира
    // обновляются раз в 10 секунд (пока вкладка видима) и при возврате на неё.
    useEffect(() => {
      const upd = () => MeetUp.myRoom().then(r => {
        if (r.ok && r.body && r.body.room) setRoom(r.body.room);
        else if (r.status === 404) setRoom(null);
      });
      window.addEventListener("focus", upd);
      const id = setInterval(() => { if (!document.hidden) upd(); }, 10000);
      return () => { window.removeEventListener("focus", upd); clearInterval(id); };
    }, []);

    async function saveName(newName) {
      const resp = await MeetUp.updateMe({ display_name: newName });
      if (resp.ok && resp.body && resp.body.user) {
        setUser(resp.body.user);
        MeetUp.saveName(resp.body.user.display_name);
        return true;
      }
      return false;
    }

    async function logout() {
      await MeetUp.authLogout();
      location.href = "login.html";
    }

    // null — убрать аватарку, File — ужать и загрузить. Сервер отвечает
    // обновлённым профилем (avatar_ver двигает URL мимо кэша).
    async function saveAvatar(fileOrNull) {
      let resp;
      if (fileOrNull == null) {
        resp = await MeetUp.api("DELETE", "/api/me/avatar");
      } else {
        let image;
        try { image = await fileToAvatarB64(fileOrNull); } catch (e) { return; }
        resp = await MeetUp.api("POST", "/api/me/avatar", { image });
      }
      if (resp.ok && resp.body && resp.body.user) setUser(resp.body.user);
    }

    // Операции с личной комнатой: null — успех, иначе машинный код ошибки
    // (текст подбирают модалки через roomErrText).
    async function createRoom(data) {
      const r = await MeetUp.createMyRoom(data);
      if (r.ok && r.body && r.body.room) { setRoom(r.body.room); return null; }
      return (r.body && r.body.error) || "server";
    }
    async function changeRoom(patch) {
      const r = await MeetUp.updateMyRoom(patch);
      if (r.ok && r.body && r.body.room) { setRoom(r.body.room); return null; }
      return (r.body && r.body.error) || "server";
    }
    async function deleteRoom() {
      await MeetUp.deleteMyRoom();
      setRoom(null);
      setRoomSetOpen(false);
    }
    async function closeRoom() {
      await MeetUp.closeMyRoom();
      // Отключения участников доходят до сервера чуть позже самого close.
      await new Promise(res => setTimeout(res, 500));
      const r = await MeetUp.myRoom();
      if (r.ok && r.body && r.body.room) setRoom(r.body.room);
    }

    if (!user) return null;   // идёт проверка сессии

    const name = user.display_name;
    const avatar = avatarSrc(user);
    return (
      <div className="page">
        <div className="topbar">
          <div className="wordmark">MeetUp</div>
          <span style={{ flex: 1 }} />
          <div className="topbar-actions">
            <IconButton icon={theme === "dark" ? "sun" : "moon"} size="sm" label="Сменить тему" onClick={toggleTheme} />
            <AccountMenu name={name} avatar={avatar} theme={theme}
                         onEditProfile={() => setProfileOpen(true)}
                         onToggleTheme={toggleTheme} onLogout={logout} />
          </div>
        </div>

        <div className="stagewrap">
          <div className="stage">
            <div className="left">
              <div className="hero">
                <div className="hero-badge">
                  <Avatar size={26} name={name} src={avatar} />
                  <span className="hb-txt">{room && room.online ? "Вы в эфире" : "Вы онлайн"}</span>
                </div>
                <div>
                  <div className="greet-label">С возвращением</div>
                  <h1 className="greet-title">{name}</h1>
                  <p className="greet-sub">
                    Ваша личная комната всегда под рукой — начните встречу в один клик
                    или подключитесь к чужой конференции.
                  </p>
                </div>
              </div>

              <div className="room-slot">
                {room ? (
                  <Card elevated>
                    <div className="room-head">
                      <h2 className="card-title">{room.title}</h2>
                      {room.online
                        ? <LiveDuration sinceMs={room.live_since_ms} />
                        : <Badge tone="muted" dot>не в эфире</Badge>}
                    </div>
                    {room.online &&
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                        <ParticipantsStack names={room.participant_names || []} />
                        <span style={{ fontSize: 13, color: "var(--text-muted)" }}>
                          Участники ({room.participants})
                        </span>
                      </div>}
                    <LinkRow code={room.code} />
                    <div className="actions-row">
                      <Button variant="primary" iconRight="arrow-right"
                              onClick={() => { location.href = "conference.html?room=" + encodeURIComponent(room.code); }}>
                        {room.online ? "Войти в эфир" : "Открыть комнату"}
                      </Button>
                      <Button variant="secondary" icon="settings" onClick={() => setRoomSetOpen(true)}>Настройки</Button>
                      {room.online &&
                        <Button variant="danger" icon="phone-off" onClick={closeRoom}>Завершить</Button>}
                    </div>
                    {!room.online &&
                      <div className="room-note">
                        Эфир начинается с вашего входа{room.password ? ", гости подключаются по паролю" : ""} —
                        и продолжается, пока в комнате кто-то есть.
                      </div>}
                  </Card>
                ) : (
                  <EmptyRoom onCreate={() => setCreateOpen(true)} />
                )}
              </div>
            </div>

            <div className="col">
              <Card style={{ flex: "none" }}>
                <h2 className="card-title" style={{ marginBottom: 16 }}>Другая встреча</h2>
                <QuickActions />
              </Card>

              <HistoryCard />
              <div className="room-note" style={{ marginTop: 0, flex: "none" }}>
                Никто не запоминает, к каким комнатам вы подключались, —
                вся история хранится только в этом браузере.
              </div>
            </div>
          </div>
        </div>

        <Modal open={profileOpen} onClose={() => setProfileOpen(false)} title="Настройки профиля"
               subtitle="Имя и фото, которые видят участники." width={440}>
          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            <AvatarEditor name={name} avatar={avatar} onChange={saveAvatar} />
            <NameField name={name} onSave={saveName} />
          </div>
        </Modal>

        <CreateRoomModal open={createOpen} onClose={() => setCreateOpen(false)}
                         userName={name} onCreate={createRoom} />
        <RoomSettingsModal open={roomSetOpen} onClose={() => setRoomSetOpen(false)}
                           room={room} onChange={changeRoom} onDelete={deleteRoom} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<HomeScreen />);
</script>

</body>
</html>
