<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MeetUp — Конференция</title>
<link rel="stylesheet" href="assets/fonts.css">
<link rel="stylesheet" href="assets/theme.css">
<style>
  html, body { height: 100%; margin: 0; }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font-ui);
    font-size: var(--text-md); line-height: var(--leading-base);
    transition: background .24s var(--ease);
  }
  #root { position: fixed; inset: 0; }
  a { color: var(--accent-ink); text-decoration: none; }
  a:hover { opacity: .8; }
  ::selection { background: var(--accent); color: var(--on-accent); }

  .conf { position: absolute; inset: 0; display: grid; grid-template-columns: 1fr 340px; }
  .stage { display: flex; flex-direction: column; min-width: 0; position: relative; }

  .confbar { display: flex; align-items: center; gap: 12px; padding: 20px 26px; flex-wrap: wrap; }
  .conf-mark {
    font-family: var(--font-label); font-weight: 700; font-size: 15px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted);
  }
  .conf-title { margin: 0; font-family: var(--font-display); font-weight: 700; font-size: 24px; letter-spacing: -.8px; }

  .gridwrap { position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .grid {
    flex: 1; min-height: 0; display: grid; gap: var(--gap-grid);
    grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; padding: 4px 26px 128px;
  }

  /* видео/кадры внутри плитки */
  .tile-media { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .mirror { transform: scaleX(-1); }

  /* пагинация плиток: стрелки по краям + точки над доком */
  .pager-dots {
    position: absolute; left: 50%; transform: translateX(-50%); bottom: 108px;
    display: flex; gap: 8px; z-index: 30;
  }
  .pager-dot {
    width: 8px; height: 8px; border-radius: var(--radius-pill); border: none; padding: 0;
    background: var(--border-strong); cursor: pointer; transition: var(--transition);
  }
  .pager-dot.on { background: var(--accent); width: 22px; }

  .dock { position: absolute; left: 50%; bottom: 26px; transform: translateX(-50%); max-width: calc(100% - 32px); }

  /* поповер «поделиться ссылкой» */
  .share-scrim { position: fixed; inset: 0; z-index: 70; background: transparent; }
  .share-pop { position: absolute; top: 72px; right: 26px; z-index: 80; width: 360px; max-width: calc(100vw - 32px); }
  .share-label {
    font-family: var(--font-label); font-weight: 700; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
  }
  .share-hint { margin-top: 12px; font-size: var(--text-xs); color: var(--text-faint); }

  /* оверлеи: гейт имени (вход по ссылке) и ошибка */
  .overlay { position: absolute; inset: 0; z-index: 90; display: grid; place-items: center; background: var(--bg); padding: 20px; }
  .overlay-card { width: 100%; max-width: 400px; }
  .overlay-title { margin: 0 0 6px; font-family: var(--font-display); font-weight: 700; font-size: 24px; letter-spacing: -.8px; }
  .overlay-sub { margin: 0 0 20px; color: var(--text-muted); font-size: var(--text-sm); overflow-wrap: anywhere; }

  /* модалка настроек: устройства, громкость, чувствительность */
  .settings-scrim {
    position: fixed; inset: 0; z-index: 95;
    background: color-mix(in srgb, var(--bg) 62%, transparent);
  }
  .settings-pop {
    position: fixed; inset: 0; z-index: 96; display: grid; place-items: center;
    padding: 20px; pointer-events: none;
  }
  .settings-card {
    width: 100%; max-width: 440px; pointer-events: auto;
    max-height: calc(100dvh - 40px); overflow: auto;
  }
  .set-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .set-title { margin: 0; font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: -.5px; }
  .set-select {
    width: 100%; padding: var(--pad-input);
    background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius-md);
    font-size: var(--text-md); font-family: var(--font-ui); font-weight: var(--weight-medium);
    outline: none; transition: var(--transition);
  }
  .set-select:focus { border-color: var(--accent-ink); }
  .set-select:disabled { opacity: .55; cursor: not-allowed; }
  /* Ползунок: трек рисуем сами (accent-color в Chrome даёт грязный трек
     на светлой теме); заполненная часть — инлайн-градиент от значения. */
  .set-range {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 6px; margin: 12px 0 4px;
    border-radius: var(--radius-pill); border: 1px solid var(--border);
    background: var(--surface-3);
    outline: none; cursor: pointer;
  }
  .set-range::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--surface);
    box-shadow: var(--shadow-pop); cursor: grab;
  }
  .set-range::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--surface);
    box-shadow: var(--shadow-pop); cursor: grab;
  }
  .mic-meter {
    height: 6px; margin-top: 10px; border-radius: var(--radius-pill);
    background: var(--surface-2); border: 1px solid var(--border); overflow: hidden;
  }
  .mic-meter-fill {
    height: 100%; width: 0; background: var(--accent);
    border-radius: var(--radius-pill); transition: width .08s linear;
  }

  /* плитка участника, чей поток зашифрован чужим ключом */
  .tile-lock {
    position: absolute; inset: 0; z-index: 2;
    display: grid; place-items: center; text-align: center; padding: 12px;
    background: color-mix(in srgb, var(--bg) 55%, transparent);
    color: var(--text-muted); font-size: var(--text-xs);
    font-weight: var(--weight-semibold);
  }
  .tile-lock b { display: block; font-size: 26px; margin-bottom: 6px; }

  .side {
    border-left: 1px solid var(--border); background: var(--surface);
    display: flex; flex-direction: column; min-height: 0;
  }
  .side-head { display: none; align-items: center; justify-content: space-between; padding: 14px 16px 0; }
  .tabs { display: flex; gap: 4px; padding: 16px 16px 0; }
  .tab {
    flex: 1; padding: 10px; border-radius: var(--radius-md); cursor: pointer;
    font-family: var(--font-ui); font-weight: 700; font-size: 13px; transition: var(--transition);
  }
  .chatscroll { flex: 1; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .peoplescroll { flex: 1; overflow: auto; padding: 12px 8px; }
  .composer { display: flex; gap: 8px; padding: 14px; border-top: 1px solid var(--border); }

  .mobile-only { display: none !important; }

  .chat-fab {
    display: none; position: absolute; right: 20px; bottom: 96px; z-index: 40;
    align-items: center; gap: 8px; padding: 12px 18px;
    border: 1px solid transparent; border-radius: var(--radius-pill);
    background: var(--accent); color: var(--on-accent);
    font-family: var(--font-ui); font-weight: 700; font-size: 14px; cursor: pointer;
    box-shadow: var(--shadow-pop);
  }
  .chat-fab .badge-n {
    min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px;
    background: var(--on-accent); color: var(--accent-ink);
    font-size: 11px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center;
  }

  /* ---- Mobile ---- */
  @media (max-width: 820px) {
    .conf { grid-template-columns: 1fr; }
    .confbar { padding: 14px 16px; gap: 10px; }
    .conf-title { font-size: 19px; }
    .grid { padding: 4px 16px 132px; }
    .dock { bottom: 20px; }
    .pager-dots { bottom: 102px; }
    .share-pop { right: 16px; top: 64px; }
    .side {
      position: fixed; inset: 0; z-index: 60; border-left: none;
      transform: translateX(100%); transition: transform .2s var(--ease);
    }
    .side.open { transform: none; }
    .side-head { display: flex; }
    .tabs { padding: 8px 16px 0; }
    .mobile-only { display: inline-flex !important; }
    .chat-fab { display: inline-flex; }
  }
</style>
</head>
<body>

<div id="root"></div>
<script src="assets/react.js"></script>
<script src="assets/react-dom.js"></script>
<script src="assets/babel.js"></script>
<script src="assets/meetup-ds.js"></script>
<script src="assets/meetup-common.js"></script>
<script src="assets/meetup-media.js?v=1"></script>
<script type="text/babel">
  const { useState, useRef, useEffect } = React;
  const { Badge, Icon, IconButton, Input, Field, Button, Card, VideoTile, ParticipantRow, ChatMessage, ControlDock } =
    window.MeetUpDesignSystem_2584b5;

  // Бинарный протокол, кодеки и E2E-шифрование живут в assets/meetup-media.js.
  const roomCode = new URLSearchParams(location.search).get("room") || "";

  function fmtTime(ms) {
    return new Date(Number(ms)).toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
  }

  // ---- Локальные настройки звука и устройств (общие для всех комнат) ----
  const AV_KEY = "meetup.av";
  const clampPct = (v) => Math.max(0, Math.min(200, Number(v) || 0));

  function loadAvSettings() {
    const def = { micId: "", camId: "", outId: "", volume: 100, sens: 100 };
    let s = def;
    try { s = { ...def, ...JSON.parse(localStorage.getItem(AV_KEY) || "{}") }; } catch (e) {}
    s.volume = clampPct(s.volume);
    s.sens = clampPct(s.sens);
    return s;
  }

  function saveAvSettings(patch) {
    try { localStorage.setItem(AV_KEY, JSON.stringify({ ...loadAvSettings(), ...patch })); }
    catch (e) { /* приватный режим — настройки живут до перезагрузки */ }
  }

  // Выбор устройства вывода работает через AudioContext.setSinkId —
  // есть в Chrome/Edge/Firefox, в Safari пока нет.
  const sinkSupported = !!(window.AudioContext && "setSinkId" in AudioContext.prototype);

  // Секрет E2E на комнату (только в этой вкладке, на сервер не уходит):
  // "p:<фраза>" или "k:<base64-ключ из ссылки>".
  const E2E_KEY = "meetup.e2e." + roomCode;
  function loadE2eSecret() {
    try { return sessionStorage.getItem(E2E_KEY) || ""; } catch (e) { return ""; }
  }
  function saveE2eSecret(v) {
    try { v ? sessionStorage.setItem(E2E_KEY, v) : sessionStorage.removeItem(E2E_KEY); }
    catch (e) { /* приватный режим */ }
  }

  function ConferenceScreen() {
    const savedName = MeetUp.savedName();

    // ---- UI-состояние ----
    const [theme, setTheme] = useState("dark");
    const [phase, setPhase] = useState(savedName ? "connecting" : "gate"); // gate|connecting|live|error
    const [errText, setErrText] = useState("");
    const [gateName, setGateName] = useState("");
    const [myId, setMyId] = useState(null);
    const [peers, setPeers] = useState([]);          // {id, name, mic, cam}
    const [messages, setMessages] = useState([]);    // {key, author, time, text, self}
    const [unread, setUnread] = useState(0);
    const [draft, setDraft] = useState("");
    const [mic, setMic] = useState(true);
    const [cam, setCam] = useState(true);
    const [sharing, setSharing] = useState(false);
    const [tab, setTab] = useState("chat");
    const [panelOpen, setPanelOpen] = useState(false);
    const [isMobile, setIsMobile] = useState(false);
    const [page, setPage] = useState(0);
    const [hasFrame, setHasFrame] = useState(() => new Set());
    const [speaking, setSpeaking] = useState(() => new Set());
    const [shareOpen, setShareOpen] = useState(false);
    const [copied, setCopied] = useState(false);
    const [elapsed, setElapsed] = useState("00:00");
    const [reconnecting, setReconnecting] = useState(false);

    const msgRef = useRef(null);
    const selfVideoRef = useRef(null);
    const touchX = useRef(null);

    // Зеркало актуального состояния для обработчиков вне рендера
    // (наполняется эффектом ниже по файлу, после вычисления pages).
    const stateRef = useRef({});

    // Имя участника (подтверждается на гейте или берётся из sessionStorage).
    const nameRef = useRef(savedName);

    // ---- Сеть и медиа (императивная часть, живёт в ref) ----
    const mediaRef = useRef(null);
    if (mediaRef.current === null) {
      const av = loadAvSettings();
      mediaRef.current = {
        ws: null, myId: null, manualClose: false, fatal: false, attempts: 0,
        camStream: null, micStream: null, displayStream: null,
        speakingUntil: new Map(), chatChain: Promise.resolve(),
        mediaStarted: false, joinedAt: 0,
        // pref — выбранные устройства и гейны из localStorage.
        pref: av,
        // Медиадвижок (кодеки, приём, E2E) и ключ шифрования — только на клиенте.
        engine: null, e2eKey: null,
      };
    }
    const M = mediaRef.current;

    // ---- Настройки: устройства и звук ----
    const [settingsOpen, setSettingsOpen] = useState(false);
    const [devices, setDevices] = useState({ mics: [], cams: [], outs: [] });
    const [micId, setMicId] = useState(M.pref.micId);
    const [camId, setCamId] = useState(M.pref.camId);
    const [outId, setOutId] = useState(M.pref.outId);
    const [volume, setVolume] = useState(M.pref.volume);
    const [sens, setSens] = useState(M.pref.sens);
    const [micLevel, setMicLevel] = useState(0);

    // ---- E2E-шифрование ----
    const [lockedIds, setLockedIds] = useState(() => new Set());
    const [e2eOn, setE2eOn] = useState(false);
    const [e2ePhrase, setE2ePhrase] = useState("");
    const [e2eBusy, setE2eBusy] = useState(false);

    // Движок создаётся один раз; колбэки замыкают только стабильные ссылки
    // (setState, ref-ы, function-декларации), пересоздание на рендерах не нужно.
    if (!M.engine) {
      M.engine = MeetUpMedia.create({
        send: (buf) => { if (M.ws && M.ws.readyState === 1) M.ws.send(buf); },
        buffered: () => (M.ws ? M.ws.bufferedAmount : 0),
        micOn: () => !!stateRef.current.mic,
        onSelfSpeaking: () => { if (M.myId != null) markSpeaking(M.myId); },
        onSpeaking: (id) => markSpeaking(id),
        onFrameActivity: (id) => {
          if (!hasFrameRef.current.has(id))
            setHasFrame(prev => { const n = new Set(prev); n.add(id); return n; });
        },
        onLocked: (id, locked) => {
          setLockedIds(prev => {
            if (prev.has(id) === locked) return prev;
            const n = new Set(prev);
            if (locked) n.add(id); else n.delete(id);
            return n;
          });
        },
      });
    }
    const engine = M.engine;

    useEffect(() => { document.documentElement.setAttribute("data-theme", theme); }, [theme]);
    const toggleTheme = () => setTheme(t => (t === "dark" ? "light" : "dark"));

    // ================= Подключение =================

    function openSocket() {
      const ws = new WebSocket(MeetUp.wsUrl());
      ws.binaryType = "arraybuffer";
      M.ws = ws;
      ws.onopen = () => ws.send(JSON.stringify({ type: "join", room: roomCode, name: nameRef.current }));
      ws.onmessage = onWsMessage;
      ws.onclose = onWsClose;
    }

    function fatal(text) {
      M.fatal = true;
      try { if (M.ws) M.ws.close(); } catch (e) {}
      setErrText(text);
      setPhase("error");
    }

    function onWsClose() {
      if (M.manualClose || M.fatal) return;
      M.attempts += 1;
      if (M.attempts > 8) {
        fatal("Соединение с сервером потеряно. Проверьте сеть и попробуйте ещё раз.");
        return;
      }
      setReconnecting(true);
      setTimeout(() => {
        if (!M.manualClose && !M.fatal) openSocket();
      }, Math.min(M.attempts, 4) * 1500);
    }

    function onWsMessage(event) {
      if (typeof event.data === "string") onJson(JSON.parse(event.data));
      else engine.onBinary(event.data);
    }

    // Текст чата: расшифровка "🔒e2e:..." при наличии ключа. raw хранится,
    // чтобы перечитать сообщение, когда пользователь введёт ключ позже.
    async function renderChatText(raw) {
      const res = await engine.openText(raw);
      if (!res.encrypted) return { raw, text: raw, locked: false };
      if (res.text != null) return { raw, text: res.text, locked: false };
      return { raw, text: "Зашифрованное сообщение — нужен ключ", locked: true };
    }

    function onJson(msg) {
      switch (msg.type) {
        case "join_ok": {
          M.myId = msg.sender_id;
          M.attempts = 0;
          if (!M.joinedAt) M.joinedAt = Date.now();
          setMyId(msg.sender_id);
          setReconnecting(false);
          setPhase("live");
          setPeers((msg.participants || []).map(p => ({
            id: p.id, name: p.name, mic: p.mic !== false, cam: p.cam !== false,
          })));
          // История чата: новый участник видит разговор, который шёл до него
          // (зашифрованные сообщения читаются при наличии ключа).
          Promise.all((msg.history || []).map(async (h, i) => ({
            key: "h" + i + "-" + h.timestamp_ms,
            author: h.sender_name || ("Участник " + h.sender_id),
            time: fmtTime(h.timestamp_ms),
            self: h.sender_id === msg.sender_id,
            ...(await renderChatText(h.text)),
          }))).then(setMessages);
          engine.clearPeers();
          engine.requestKeyframe();   // просим у вещающих опорные кадры
          pushState(stateRef.current.mic, stateRef.current.sharing ? true : stateRef.current.cam);
          if (!M.mediaStarted) { M.mediaStarted = true; startMedia(); }
          break;
        }
        case "participant_joined":
          setPeers(prev => prev.some(p => p.id === msg.id) ? prev : [...prev, {
            id: msg.id, name: msg.name, mic: msg.mic !== false, cam: msg.cam !== false,
          }]);
          engine.forceKeyframe();   // новичку нужен опорный кадр, не ждать 3 с
          break;
        case "participant_left":
          setPeers(prev => prev.filter(p => p.id !== msg.id));
          engine.dropPeer(msg.id);
          M.speakingUntil.delete(msg.id);
          dropFromSet(setHasFrame, msg.id);
          dropFromSet(setLockedIds, msg.id);
          break;
        case "participant_state":
          setPeers(prev => prev.map(p => p.id === msg.id ? { ...p, mic: !!msg.mic, cam: !!msg.cam } : p));
          if (!msg.cam) {
            engine.lastFrameAt.delete(msg.id);
            dropFromSet(setHasFrame, msg.id);
          }
          break;
        case "chat": {
          const self = msg.sender_id === M.myId;
          // Расшифровка асинхронная — цепочка сохраняет порядок сообщений.
          M.chatChain = M.chatChain.then(async () => {
            const body = await renderChatText(msg.text);
            setMessages(prev => [...prev, {
              key: msg.timestamp_ms + "-" + msg.sender_id + "-" + prev.length,
              author: msg.sender_name || ("Участник " + msg.sender_id),
              time: fmtTime(msg.timestamp_ms),
              self,
              ...body,
            }]);
          });
          const s = stateRef.current;
          const chatVisible = s.isMobile ? (s.panelOpen && s.tab === "chat") : s.tab === "chat";
          if (!self && !chatVisible) setUnread(u => u + 1);
          break;
        }
        case "error":
          if (msg.reason === "room_not_found") {
            M.manualClose = true;
            fatal("Комната не найдена или уже закрыта. Проверьте ссылку либо создайте новую комнату в лобби.");
          } else {
            console.warn("Ошибка сервера:", msg.reason);
          }
          break;
      }
    }

    function pushState(micVal, camVal) {
      if (M.ws && M.ws.readyState === 1)
        M.ws.send(JSON.stringify({ type: "state", mic: micVal, cam: camVal }));
    }

    // Убрать id из Set-состояния (hasFrame, lockedIds), не трогая лишний рендер.
    function dropFromSet(setter, id) {
      setter(prev => {
        if (!prev.has(id)) return prev;
        const n = new Set(prev); n.delete(id); return n;
      });
    }

    // ================= Приём медиа =================
    // Кадры и звук разбирает движок (assets/meetup-media.js) — страница
    // получает события: активность кадров, «говорит», «зашифровано».

    const hasFrameRef = useRef(hasFrame);
    useEffect(() => { hasFrameRef.current = hasFrame; }, [hasFrame]);

    const messagesRef = useRef(messages);
    useEffect(() => { messagesRef.current = messages; }, [messages]);

    function markSpeaking(id) {
      M.speakingUntil.set(id, Date.now() + 450);
    }

    // ================= Захват медиа =================

    async function startMedia() {
      await engine.ensureAudio();
      engine.setVolume(M.pref.volume / 100);
      engine.setSensitivity(M.pref.sens / 100);
      if (M.pref.outId) engine.setSinkId(M.pref.outId);
      await startMic();
      await startCamera();
    }

    // getUserMedia с выбранным устройством; если оно пропало — системное.
    function mediaConstraints(kind, id) {
      const base = kind === "audio"
        ? { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
        : { width: 1280, height: 720 };
      if (id) base.deviceId = { exact: id };
      return { [kind]: base };
    }

    async function grabStream(kind, id) {
      try {
        return await navigator.mediaDevices.getUserMedia(mediaConstraints(kind, id));
      } catch (e) {
        if (!id) throw e;
        return navigator.mediaDevices.getUserMedia(mediaConstraints(kind, ""));
      }
    }

    async function startMic() {
      if (!M.micStream) {
        try {
          M.micStream = await grabStream("audio", M.pref.micId);
        } catch (e) {
          setMic(false);
          pushState(false, stateRef.current.sharing ? true : stateRef.current.cam);
          return false;
        }
      }
      await engine.startMic(M.micStream);
      return true;
    }

    async function startCamera() {
      if (!M.camStream) {
        try {
          M.camStream = await grabStream("video", M.pref.camId);
        } catch (e) {
          setCam(false);
          pushState(stateRef.current.mic, stateRef.current.sharing ? true : false);
          return false;
        }
      }
      // Во время демонстрации экрана в эфир идёт displayStream.
      if (!M.displayStream) engine.startVideo(M.camStream, { screen: false });
      return true;
    }

    // ================= Кнопки дока =================

    async function toggleMic() {
      const next = !stateRef.current.mic;
      if (next && !M.micStream) {
        // Разрешения не было — пробуем запросить ещё раз.
        const ok = await startMic();
        if (!ok) return;
      }
      if (M.micStream) M.micStream.getAudioTracks().forEach(t => { t.enabled = next; });
      setMic(next);
      pushState(next, stateRef.current.sharing ? true : stateRef.current.cam);
    }

    async function toggleCamera() {
      const s = stateRef.current;
      if (s.sharing) stopSharing(false);
      const next = !s.cam;
      if (next) {
        if (!M.camStream) {
          const ok = await startCamera();
          if (!ok) return;
        } else {
          engine.startVideo(M.camStream, { screen: false });
        }
      } else if (M.camStream) {
        // Останавливаем дорожки, а не просто глушим — гаснет индикатор камеры.
        M.camStream.getTracks().forEach(t => t.stop());
        M.camStream = null;
        engine.stopVideo();
      }
      setCam(next);
      pushState(s.mic, next);
    }

    async function toggleShare() {
      const s = stateRef.current;
      if (s.sharing) { stopSharing(true); return; }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) return;
      let stream;
      try {
        stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
      } catch (e) {
        return;   // пользователь отменил выбор
      }
      M.displayStream = stream;
      const track = stream.getVideoTracks()[0];
      if (track) track.onended = () => stopSharing(true);   // «Прекратить доступ»
      engine.startVideo(stream, { screen: true });
      setSharing(true);
      pushState(s.mic, true);
    }

    function stopSharing(push) {
      const s = stateRef.current;
      if (M.displayStream) {
        M.displayStream.getTracks().forEach(t => t.stop());
        M.displayStream = null;
      }
      if (M.camStream && s.cam) engine.startVideo(M.camStream, { screen: false });
      else engine.stopVideo();
      setSharing(false);
      if (push) pushState(s.mic, s.cam);
    }

    function stopEverything() {
      engine.stop();
      [M.camStream, M.micStream, M.displayStream].forEach(st => {
        if (st) st.getTracks().forEach(t => t.stop());
      });
    }

    function leave() {
      M.manualClose = true;
      try { if (M.ws) M.ws.close(); } catch (e) {}
      stopEverything();
      location.href = "anon_lobby.html";
    }

    // ================= Настройки =================

    async function refreshDevices() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;
      let list = [];
      try { list = await navigator.mediaDevices.enumerateDevices(); } catch (e) { return; }
      const mics = [], cams = [], outs = [];
      for (const d of list) {
        // Без разрешения на медиа label пустой — подписываем по номеру.
        if (d.kind === "audioinput") mics.push({ id: d.deviceId, label: d.label || ("Микрофон " + (mics.length + 1)) });
        else if (d.kind === "videoinput") cams.push({ id: d.deviceId, label: d.label || ("Камера " + (cams.length + 1)) });
        else if (d.kind === "audiooutput") outs.push({ id: d.deviceId, label: d.label || ("Динамики " + (outs.length + 1)) });
      }
      setDevices({ mics, cams, outs });
    }

    function openSettings() {
      refreshDevices();
      setSettingsOpen(true);
    }

    async function selectMic(id) {
      setMicId(id);
      M.pref.micId = id;
      saveAvSettings({ micId: id });
      if (!M.micStream) return;   // микрофон не захвачен — применится при включении
      let stream;
      try { stream = await grabStream("audio", id); } catch (e) { refreshDevices(); return; }
      M.micStream.getTracks().forEach(t => t.stop());
      M.micStream = stream;
      stream.getAudioTracks().forEach(t => { t.enabled = stateRef.current.mic; });
      await engine.startMic(stream);
    }

    async function selectCam(id) {
      setCamId(id);
      M.pref.camId = id;
      saveAvSettings({ camId: id });
      if (!M.camStream) return;   // камера выключена — применится при включении
      let stream;
      try { stream = await grabStream("video", id); } catch (e) { refreshDevices(); return; }
      M.camStream.getTracks().forEach(t => t.stop());
      M.camStream = stream;
      // Во время демонстрации экрана в эфире остаётся displayStream.
      if (!M.displayStream && stateRef.current.cam) engine.startVideo(stream, { screen: false });
    }

    function selectOut(id) {
      setOutId(id);
      M.pref.outId = id;
      saveAvSettings({ outId: id });
      engine.setSinkId(id);
    }

    function changeVolume(v) {
      setVolume(v);
      saveAvSettings({ volume: v });
      engine.setVolume(v / 100);
    }

    function changeSens(v) {
      setSens(v);
      saveAvSettings({ sens: v });
      engine.setSensitivity(v / 100);
    }

    // ================= E2E-шифрование =================

    // Единая точка включения/выключения: ключ в движок, секрет в sessionStorage,
    // уже полученный чат — перечитать с новым ключом.
    async function applyE2eKey(key, secretToStore, phraseForUi) {
      M.e2eKey = key;
      engine.setKey(key);
      saveE2eSecret(key ? secretToStore : "");
      setE2eOn(!!key);
      setE2ePhrase(phraseForUi || "");
      M.chatChain = M.chatChain.then(async () => {
        const updated = await Promise.all(
          messagesRef.current.map(async (m) => ({ ...m, ...(await renderChatText(m.raw)) })));
        setMessages(updated);
      });
    }

    // Восстановление ключа при загрузке: #k= из ссылки важнее сохранённого.
    async function applySavedE2e() {
      try {
        const fromHash = location.hash.match(/[#&]k=([A-Za-z0-9_-]+)/);
        if (fromHash) {
          await applyE2eKey(await MeetUpMedia.importKeyB64(fromHash[1]), "k:" + fromHash[1], "");
          return;
        }
        const saved = loadE2eSecret();
        if (saved.startsWith("k:"))
          await applyE2eKey(await MeetUpMedia.importKeyB64(saved.slice(2)), saved, "");
        else if (saved.startsWith("p:"))
          await applyE2eKey(await MeetUpMedia.deriveKeyFromPhrase(saved.slice(2), roomCode),
                            saved, saved.slice(2));
      } catch (e) { /* битый ключ в ссылке или хранилище — просто без E2E */ }
    }

    async function applyPhrase() {
      const phrase = e2ePhrase.trim();
      setE2eBusy(true);
      try {
        if (!phrase) await applyE2eKey(null, "", "");
        else await applyE2eKey(await MeetUpMedia.deriveKeyFromPhrase(phrase, roomCode),
                               "p:" + phrase, phrase);
      } finally {
        setE2eBusy(false);
      }
    }

    async function disableE2e() {
      await applyE2eKey(null, "", "");
    }

    // Ссылка-приглашение с ключом: ключ уезжает во fragment (#k=…) —
    // эта часть адреса на сервер не отправляется.
    async function copyKeyInvite() {
      if (!M.e2eKey) return;
      const url = inviteUrl + "#k=" + (await MeetUpMedia.exportKeyB64(M.e2eKey));
      const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1800); };
      if (navigator.clipboard && window.isSecureContext)
        navigator.clipboard.writeText(url).then(done, () => fallbackCopy(url, done));
      else
        fallbackCopy(url, done);
    }

    // ================= Чат =================

    function sendChat() {
      const text = draft.trim();
      if (!text || !M.ws || M.ws.readyState !== 1) return;
      setDraft("");
      if (engine.encrypted()) {
        // Сервер хранит и ретранслирует шифротекст — прочитают только с ключом.
        engine.sealText(text).then(sealed => {
          if (sealed && M.ws && M.ws.readyState === 1)
            M.ws.send(JSON.stringify({ type: "chat", text: sealed }));
        });
      } else {
        M.ws.send(JSON.stringify({ type: "chat", text }));
      }
    }

    useEffect(() => {
      if (msgRef.current) msgRef.current.scrollTop = msgRef.current.scrollHeight;
    }, [messages, tab, panelOpen]);

    // Сбрасываем счётчик непрочитанного, когда чат на виду.
    useEffect(() => {
      const chatVisible = isMobile ? (panelOpen && tab === "chat") : tab === "chat";
      if (chatVisible) setUnread(0);
    }, [messages, tab, panelOpen, isMobile]);

    // ================= Гейт имени (вход по ссылке) =================

    function gateSubmit() {
      const name = gateName.trim();
      if (!name) return;
      MeetUp.saveName(name);
      nameRef.current = name;
      setPhase("connecting");
      openSocket();
    }

    // ================= Ссылка-приглашение =================

    const inviteUrl = location.origin + location.pathname + "?room=" + encodeURIComponent(roomCode);

    function fallbackCopy(text, done) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); done(); } catch (e) {}
      document.body.removeChild(ta);
    }

    function copyInvite() {
      const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1800); };
      if (navigator.clipboard && window.isSecureContext)
        navigator.clipboard.writeText(inviteUrl).then(done, () => fallbackCopy(inviteUrl, done));
      else
        fallbackCopy(inviteUrl, done);
    }

    function openShare() {
      setShareOpen(true);
      copyInvite();   // показываем и сразу копируем в буфер
    }

    // ================= Эффекты монтирования =================

    useEffect(() => {
      if (!roomCode) { location.replace("anon_lobby.html"); return; }

      // Сначала восстанавливаем ключ E2E (ссылка/хранилище), потом коннект —
      // иначе история чата из join_ok расшифруется без ключа.
      (async () => {
        await applySavedE2e();
        if (savedName) openSocket();
      })();

      const mq = window.matchMedia("(max-width: 820px)");
      const updMq = () => setIsMobile(mq.matches);
      updMq();
      mq.addEventListener("change", updMq);

      // Устаревшие кадры (участник завис/пропал) — возвращаем заглушку.
      const staleTimer = setInterval(() => {
        const now = Date.now();
        const stale = [];
        hasFrameRef.current.forEach((id) => {
          const at = engine.lastFrameAt.get(id) || 0;
          if (now - at > 5000) stale.push(id);
        });
        if (stale.length)
          setHasFrame(prev => { const n = new Set(prev); stale.forEach(id => n.delete(id)); return n; });
      }, 3000);

      // Индикатор «говорит»: по громкости, с затуханием.
      let prevSpeakingKey = "";
      const speakTimer = setInterval(() => {
        const now = Date.now();
        const ids = [];
        M.speakingUntil.forEach((until, id) => { if (until > now) ids.push(id); });
        ids.sort((a, b) => a - b);
        const key = ids.join(",");
        if (key !== prevSpeakingKey) {
          prevSpeakingKey = key;
          setSpeaking(new Set(ids));
        }
      }, 250);

      // Таймер «в эфире».
      const elapsedTimer = setInterval(() => {
        if (!M.joinedAt) return;
        const total = Math.floor((Date.now() - M.joinedAt) / 1000);
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const sec = total % 60;
        const pad = (x) => String(x).padStart(2, "0");
        setElapsed(h > 0 ? h + ":" + pad(m) + ":" + pad(sec) : pad(m) + ":" + pad(sec));
      }, 1000);

      // Esc закрывает поповеры; стрелки листают страницы плиток
      // (кроме случаев, когда фокус в поле ввода или открыты настройки).
      const onKey = (e) => {
        if (e.key === "Escape") { setSettingsOpen(false); setShareOpen(false); return; }
        const tag = (e.target && e.target.tagName) || "";
        if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
        if (stateRef.current.settingsOpen) return;
        if (e.key === "ArrowLeft") setPage(p => Math.max(0, p - 1));
        if (e.key === "ArrowRight") setPage(p => Math.min(stateRef.current.pages - 1, p + 1));
      };
      window.addEventListener("keydown", onKey);

      // Подключили/выдернули устройство — обновляем списки в настройках.
      const onDevChange = () => { if (stateRef.current.settingsOpen) refreshDevices(); };
      if (navigator.mediaDevices && navigator.mediaDevices.addEventListener)
        navigator.mediaDevices.addEventListener("devicechange", onDevChange);

      return () => {
        mq.removeEventListener("change", updMq);
        clearInterval(staleTimer);
        clearInterval(speakTimer);
        clearInterval(elapsedTimer);
        window.removeEventListener("keydown", onKey);
        if (navigator.mediaDevices && navigator.mediaDevices.removeEventListener)
          navigator.mediaDevices.removeEventListener("devicechange", onDevChange);
        M.manualClose = true;
        try { if (M.ws) M.ws.close(); } catch (e) {}
        stopEverything();
      };
    }, []);

    // Своя плитка: превью пере-присваивается после каждого рендера,
    // потому что <video> размонтируется при листании страниц.
    useEffect(() => {
      const el = selfVideoRef.current;
      const stream = M.displayStream || (cam ? M.camStream : null);
      if (el && stream && el.srcObject !== stream) {
        el.srcObject = stream;
        const p = el.play();
        if (p && p.catch) p.catch(() => {});
      }
    });

    // ================= Плитки и страницы =================

    const selfHasVideo = sharing || cam;
    const tiles = [{
      key: "self", id: myId, name: nameRef.current || "Вы", self: true,
      mic, cam: selfHasVideo, speaking: myId != null && speaking.has(myId), hasFrame: true,
    }].concat(peers.map(p => ({
      key: "p" + p.id, id: p.id, name: p.name, self: false,
      mic: p.mic, cam: p.cam, speaking: speaking.has(p.id), hasFrame: hasFrame.has(p.id),
    })));

    const perPage = isMobile ? 6 : 9;
    const pages = Math.max(1, Math.ceil(tiles.length / perPage));
    const curPage = Math.min(page, pages - 1);
    const visible = tiles.slice(curPage * perPage, curPage * perPage + perPage);

    // Актуальный снимок состояния для обработчиков вне рендера
    // (WS-сообщения, таймеры, аудио-callback).
    useEffect(() => {
      stateRef.current = { phase, mic, cam, sharing, tab, panelOpen, isMobile, pages, settingsOpen };
    });

    // Индикатор уровня микрофона — обновляется только при открытых настройках.
    useEffect(() => {
      if (!settingsOpen) return;
      const t = setInterval(() => setMicLevel(engine.micLevel()), 100);
      return () => clearInterval(t);
    }, [settingsOpen]);

    // До трёх участников на широком экране — «дизайнерская» раскладка
    // (своя плитка крупнее); дальше — равномерная сетка страницами.
    const featured = !isMobile && tiles.length <= 3;
    let gridStyle;
    if (featured) {
      gridStyle = tiles.length === 1
        ? { gridTemplateColumns: "1fr", gridTemplateRows: "1fr" }
        : tiles.length === 2
          ? { gridTemplateColumns: "1fr 1fr", gridTemplateRows: "1fr" }
          : { gridTemplateColumns: "2fr 1fr", gridTemplateRows: "1fr 1fr" };
    } else {
      const k = Math.max(1, visible.length);
      const cols = isMobile ? (k <= 2 ? 1 : 2) : Math.ceil(Math.sqrt(k));
      const rows = Math.ceil(k / cols);
      gridStyle = {
        gridTemplateColumns: "repeat(" + cols + ", 1fr)",
        gridTemplateRows: "repeat(" + rows + ", 1fr)",
        overflow: "hidden",
      };
    }

    function renderTile(t, idx) {
      const locked = !t.self && lockedIds.has(t.id);
      let media = null;
      if (t.self) {
        if (selfHasVideo)
          media = <video ref={selfVideoRef} className={"tile-media" + (sharing ? "" : " mirror")}
                         autoPlay muted playsInline />;
      } else if (t.cam && t.hasFrame && !locked) {
        media = <canvas className="tile-media" ref={engine.videoSinkRef(t.id)} />;
      }
      const spanSelf = featured && tiles.length === 3 && idx === 0;
      return (
        <div key={t.key} style={{ minHeight: 0, ...(spanSelf ? { gridRow: "1 / 3" } : null) }}>
          <VideoTile name={t.name} self={t.self} muted={!t.mic} speaking={t.speaking}
                     style={{ aspectRatio: "auto", height: "100%" }}>
            {(media || locked) ? <>
              {media}
              {locked &&
                <div className="tile-lock">
                  <div><b>🔒</b>Зашифровано — нужен ключ</div>
                </div>}
            </> : null}
          </VideoTile>
        </div>
      );
    }

    function onTouchStart(e) { touchX.current = e.touches[0].clientX; }
    function onTouchEnd(e) {
      if (touchX.current == null) return;
      const dx = e.changedTouches[0].clientX - touchX.current;
      touchX.current = null;
      if (Math.abs(dx) < 60) return;
      if (dx < 0) setPage(p => Math.min(pages - 1, p + 1));
      else setPage(p => Math.max(0, p - 1));
    }

    function tabStyle(k) {
      const on = tab === k;
      return {
        border: "1px solid " + (on ? "transparent" : "var(--border)"),
        background: on ? "var(--accent)" : "transparent",
        color: on ? "var(--on-accent)" : "var(--text-muted)",
      };
    }

    const shortCode = roomCode.length > 10 ? roomCode.slice(0, 8) + "…" : roomCode;
    const participantRows = [{ id: "self", name: nameRef.current || "Вы", you: true, muted: !mic }]
      .concat(peers.map(p => ({ id: p.id, name: p.name, you: false, muted: !p.mic })));

    return (
      <div className="conf" style={{ background: "var(--bg)", color: "var(--text)", fontFamily: "var(--font-ui)" }}>
        {/* stage */}
        <div className="stage">
          <div className="confbar">
            <div className="conf-mark">MeetUp</div>
            <h1 className="conf-title">Комната <span style={{ color: "var(--accent-ink)" }}>#{roomCode.slice(0, 6)}</span></h1>
            <span style={{ flex: 1 }} />
            {phase === "live" && !reconnecting &&
              <Badge tone="live" dot>в эфире · {elapsed}</Badge>}
            {reconnecting &&
              <Badge tone="danger" dot>переподключение…</Badge>}
            {phase === "connecting" && !reconnecting &&
              <Badge tone="muted" dot>подключение…</Badge>}
            {e2eOn &&
              <span title="Сквозное шифрование включено: видео, голос и чат зашифрованы ключом участников">
                <Badge tone="accent">E2E 🔒</Badge>
              </span>}
            <span title={roomCode}><Badge tone="accent">{shortCode}</Badge></span>
            <IconButton icon="copy" size="sm" label="Скопировать ссылку-приглашение" onClick={openShare} />
            <IconButton icon={theme === "dark" ? "sun" : "moon"} size="sm" label="Сменить тему" onClick={toggleTheme} />
          </div>

          <div className="gridwrap"
               onTouchStart={pages > 1 ? onTouchStart : undefined}
               onTouchEnd={pages > 1 ? onTouchEnd : undefined}>
            <div className="grid" style={gridStyle}>
              {visible.map(renderTile)}
            </div>

            {pages > 1 && <>
              <IconButton icon="arrow-right" label="Предыдущая страница" disabled={curPage === 0}
                          onClick={() => setPage(p => Math.max(0, p - 1))}
                          style={{ position: "absolute", left: 34, top: "50%",
                                   transform: "translateY(-50%) rotate(180deg)", zIndex: 30 }} />
              <IconButton icon="arrow-right" label="Следующая страница" disabled={curPage === pages - 1}
                          onClick={() => setPage(p => Math.min(pages - 1, p + 1))}
                          style={{ position: "absolute", right: 34, top: "50%",
                                   transform: "translateY(-50%)", zIndex: 30 }} />
              <div className="pager-dots">
                {Array.from({ length: pages }).map((_, i) => (
                  <button key={i} className={"pager-dot" + (i === curPage ? " on" : "")}
                          aria-label={"Страница " + (i + 1)} onClick={() => setPage(i)} />
                ))}
              </div>
            </>}
          </div>

          <div className="dock">
            <ControlDock
              micOn={mic} cameraOn={cam} sharing={sharing}
              settingsOpen={settingsOpen} showShare={!isMobile}
              onToggleMic={toggleMic}
              onToggleCamera={toggleCamera}
              onToggleShare={toggleShare}
              onOpenSettings={openSettings}
              onLeave={leave}
            />
          </div>

          <button className="chat-fab" onClick={() => { setPanelOpen(true); setTab("chat"); }}>
            <Icon name="chat" size={18} />
            Чат
            {unread > 0 && <span className="badge-n">{unread}</span>}
          </button>

          {/* поповер «поделиться» */}
          {shareOpen && <>
            <div className="share-scrim" onClick={() => setShareOpen(false)} />
            <div className="share-pop">
              <Card elevated width="100%">
                <div className="share-label">Ссылка-приглашение</div>
                <Input readOnly value={inviteUrl} onFocus={(e) => e.target.select()} />
                <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                  <Button variant="primary" block icon={copied ? "check" : "copy"} onClick={copyInvite}>
                    {copied ? "Скопировано" : "Копировать"}
                  </Button>
                  {navigator.share &&
                    <IconButton icon="arrow-right" label="Поделиться…"
                                onClick={() => navigator.share({ title: "MeetUp — конференция", url: inviteUrl }).catch(() => {})} />}
                </div>
                {e2eOn &&
                  <Button variant="secondary" block icon="copy" style={{ marginTop: 8 }}
                          onClick={copyKeyInvite}>
                    Ссылка с ключом E2E
                  </Button>}
                <div className="share-hint">
                  {e2eOn
                    ? "Обычная ссылка не содержит ключ: вошедший по ней увидит «зашифровано»."
                    : "По ссылке входят без аккаунта: имя — и сразу в эфир."}
                </div>
              </Card>
            </div>
          </>}
        </div>

        {/* side panel */}
        <div className={"side" + (panelOpen ? " open" : "")}>
          <div className="side-head">
            <span style={{ fontFamily: "var(--font-label)", fontWeight: 700, fontSize: 12,
                           letterSpacing: 2, textTransform: "uppercase", color: "var(--text-muted)" }}>Панель</span>
            <IconButton icon="x" size="sm" label="Закрыть" onClick={() => setPanelOpen(false)} />
          </div>
          <div className="tabs">
            <button className="tab" style={tabStyle("chat")} onClick={() => setTab("chat")}>
              Чат{unread > 0 && tab !== "chat" ? " (" + unread + ")" : ""}
            </button>
            <button className="tab" style={tabStyle("people")} onClick={() => setTab("people")}>
              Участники ({participantRows.length})
            </button>
          </div>

          {tab === "people" ? (
            <div className="peoplescroll">
              {participantRows.map(p => (
                <ParticipantRow key={p.id} name={p.name} you={p.you} muted={p.muted} />
              ))}
            </div>
          ) : (
            <>
              <div ref={msgRef} className="chatscroll">
                {messages.map(m => (
                  <ChatMessage key={m.key} author={m.author} time={m.time} text={m.text} self={m.self} />
                ))}
              </div>
              <div className="composer">
                <Input value={draft} placeholder="Сообщение…" autoComplete="off" maxLength={2000}
                       onChange={e => setDraft(e.target.value)}
                       onKeyDown={e => e.key === "Enter" && sendChat()} />
                <IconButton icon="send" variant="accent" label="Отправить" onClick={sendChat} />
              </div>
            </>
          )}
        </div>

        {/* настройки: устройства, громкость, чувствительность */}
        {settingsOpen && <>
          <div className="settings-scrim" onClick={() => setSettingsOpen(false)} />
          <div className="settings-pop" role="dialog" aria-modal="true" aria-label="Настройки">
            <div className="settings-card">
              <Card elevated width="100%">
                <div className="set-head">
                  <h2 className="set-title">Настройки</h2>
                  <IconButton icon="x" size="sm" label="Закрыть" onClick={() => setSettingsOpen(false)} />
                </div>

                <Field label="Микрофон" htmlFor="set-mic">
                  <select id="set-mic" className="set-select" value={micId}
                          onChange={e => selectMic(e.target.value)}>
                    {!devices.mics.some(d => d.id === micId) &&
                      <option value={micId}>Системный по умолчанию</option>}
                    {devices.mics.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}
                  </select>
                  <div className="mic-meter" aria-hidden="true">
                    <div className="mic-meter-fill"
                         style={{ width: Math.round(Math.min(1, micLevel * 3) * 100) + "%" }} />
                  </div>
                </Field>

                <Field label="Камера" htmlFor="set-cam" style={{ marginTop: 16 }}>
                  <select id="set-cam" className="set-select" value={camId}
                          onChange={e => selectCam(e.target.value)}>
                    {!devices.cams.some(d => d.id === camId) &&
                      <option value={camId}>Системная по умолчанию</option>}
                    {devices.cams.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}
                  </select>
                </Field>

                <Field label="Динамики" htmlFor="set-out" style={{ marginTop: 16 }}
                       hint={sinkSupported ? undefined : "Браузер не поддерживает выбор устройства вывода."}>
                  <select id="set-out" className="set-select" value={outId} disabled={!sinkSupported}
                          onChange={e => selectOut(e.target.value)}>
                    {!devices.outs.some(d => d.id === outId) &&
                      <option value={outId}>Системные по умолчанию</option>}
                    {devices.outs.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}
                  </select>
                </Field>

                <Field label={"Громкость воспроизведения · " + volume + "%"} htmlFor="set-volume"
                       style={{ marginTop: 18 }}>
                  <input id="set-volume" className="set-range" type="range"
                         min="0" max="200" step="5" value={volume}
                         style={{ background: "linear-gradient(90deg, var(--accent) " + (volume / 2) + "%, var(--surface-3) " + (volume / 2) + "%)" }}
                         onChange={e => changeVolume(Number(e.target.value))} />
                </Field>

                <Field label={"Чувствительность микрофона · " + sens + "%"} htmlFor="set-sens"
                       hint="Влияет на громкость вашего голоса у собеседников."
                       style={{ marginTop: 14 }}>
                  <input id="set-sens" className="set-range" type="range"
                         min="0" max="200" step="5" value={sens}
                         style={{ background: "linear-gradient(90deg, var(--accent) " + (sens / 2) + "%, var(--surface-3) " + (sens / 2) + "%)" }}
                         onChange={e => changeSens(Number(e.target.value))} />
                </Field>

                <Field label={"Сквозное шифрование" + (e2eOn ? " · включено" : "")} htmlFor="set-e2e"
                       hint="Одна фраза у всех участников. Ключ не покидает браузер — сервер видит только шифрованные данные."
                       style={{ marginTop: 18 }}>
                  <div style={{ display: "flex", gap: 8 }}>
                    <Input id="set-e2e" type="password" value={e2ePhrase} autoComplete="off"
                           placeholder={e2eOn && !e2ePhrase ? "Ключ загружен из ссылки" : "Фраза-ключ"}
                           onChange={e => setE2ePhrase(e.target.value)}
                           onKeyDown={e => e.key === "Enter" && applyPhrase()} />
                    <Button variant={e2eOn ? "secondary" : "primary"} disabled={e2eBusy}
                            onClick={applyPhrase}>
                      {e2eOn ? "Сменить" : "Включить"}
                    </Button>
                  </div>
                  {e2eOn &&
                    <Button variant="ghost" block size="sm" style={{ marginTop: 8 }}
                            onClick={disableE2e}>
                      Отключить шифрование
                    </Button>}
                </Field>
              </Card>
            </div>
          </div>
        </>}

        {/* гейт имени: вход по ссылке-приглашению */}
        {phase === "gate" &&
          <div className="overlay">
            <div className="overlay-card">
              <Card elevated width="100%">
                <h2 className="overlay-title">Присоединиться</h2>
                <p className="overlay-sub">Комната <b>#{roomCode.slice(0, 6)}</b>. Представьтесь — и вы в эфире.</p>
                <Field label="Ваше имя" htmlFor="gate-name">
                  <Input id="gate-name" autoFocus value={gateName} maxLength={40} placeholder="Анна"
                         autoComplete="name"
                         onChange={e => setGateName(e.target.value)}
                         onKeyDown={e => e.key === "Enter" && gateSubmit()} />
                </Field>
                <Button variant="primary" block iconRight="arrow-right" style={{ marginTop: 20 }}
                        disabled={!gateName.trim()} onClick={gateSubmit}>
                  Подключиться
                </Button>
                <Button variant="ghost" block style={{ marginTop: 10 }}
                        onClick={() => { location.href = "anon_lobby.html"; }}>
                  В лобби
                </Button>
              </Card>
            </div>
          </div>}

        {/* ошибка подключения */}
        {phase === "error" &&
          <div className="overlay">
            <div className="overlay-card">
              <Card elevated width="100%">
                <h2 className="overlay-title">Не получилось</h2>
                <p className="overlay-sub">{errText}</p>
                <Button variant="primary" block style={{ marginTop: 8 }}
                        onClick={() => location.reload()}>
                  Попробовать снова
                </Button>
                <Button variant="ghost" block style={{ marginTop: 10 }}
                        onClick={() => { location.href = "anon_lobby.html"; }}>
                  В лобби
                </Button>
              </Card>
            </div>
          </div>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<ConferenceScreen />);
</script>

</body>
</html>
