<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MeetUp — Регистрация</title>
<link rel="stylesheet" href="assets/fonts.css">
<link rel="stylesheet" href="assets/theme.css">
<style>
  html, body { height: 100%; margin: 0; }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: var(--text-md);
    line-height: var(--leading-base);
    transition: background .24s var(--ease);
  }
  #root { position: fixed; inset: 0; }
  a { color: var(--accent-ink); text-decoration: none; }
  a:hover { opacity: .8; }
  ::selection { background: var(--accent); color: var(--on-accent); }

  .page { position: absolute; inset: 0; display: flex; flex-direction: column; }

  .topbar { display: flex; align-items: center; padding: 22px 28px; }
  .wordmark {
    font-family: var(--font-label); font-weight: 700; font-size: 18px;
    letter-spacing: 2px; text-transform: uppercase;
  }

  .stagewrap { flex: 1; display: grid; place-items: center; padding: 0 28px 40px; overflow: auto; }
  .stage {
    display: grid; grid-template-columns: 1.05fr .95fr; gap: 56px;
    align-items: center; max-width: 900px; width: 100%;
  }

  .hero-title {
    margin: 0; font-family: var(--font-display); font-weight: 800;
    font-size: clamp(38px, 6vw, 58px); line-height: .95; letter-spacing: -1.5px;
  }
  .hero-sub {
    margin-top: 20px; max-width: 340px; color: var(--text-muted);
    font-size: 15px; line-height: 1.5;
  }
  .hero-meta {
    margin-top: 28px; display: flex; align-items: center; gap: 10px;
    font-family: var(--font-label); font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-faint);
  }
  .hero-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live); }

  .cardwrap { justify-self: end; width: 100%; max-width: 380px; }

  .signin { margin-top: 14px; text-align: center; font-size: 12px; color: var(--text-faint); }

  .msg { margin-top: 14px; text-align: center; font-size: 12px; }

  /* ---- Mobile ---- */
  @media (max-width: 760px) {
    .topbar { padding: 18px 20px; }
    .stagewrap { padding: 0 20px 28px; align-items: start; }
    .stage {
      grid-template-columns: 1fr; gap: 26px; max-width: 420px; min-width: 0;
      align-content: start; padding-top: 8px;
    }
    .hero { text-align: left; }
    .hero-title { font-size: clamp(32px, 11vw, 44px); min-width: 0; overflow-wrap: anywhere; }
    .hero-sub { margin-top: 14px; max-width: none; font-size: 14px; }
    .hero-meta { margin-top: 18px; }
    .cardwrap { justify-self: stretch; max-width: none; }
  }
  @media (max-width: 400px) {
    .hero-sub { display: none; }
    .hero-meta { display: none; }
  }
</style>
</head>
<body>

<div id="root"></div>
<script src="assets/react.js"></script>
<script src="assets/react-dom.js"></script>
<script src="assets/babel.js"></script>
<script src="assets/meetup-ds.js?v=4"></script>
<script src="assets/meetup-common.js?v=4"></script>
<script type="text/babel">
  const { useState, useEffect } = React;
  const { Card, Button, Input, Field, IconButton } = window.MeetUpDesignSystem_2584b5;

  // Тексты ошибок по машинным кодам сервера (body.error).
  const ERRORS = {
    invalid_login: "Логин: 3–32 символа — латиница, цифры, точка, дефис, подчёркивание.",
    invalid_display_name: "Отображаемое имя: от 1 до 40 символов.",
    weak_password: "Пароль слишком короткий — минимум 8 символов.",
    login_taken: "Такой логин уже занят. Попробуйте другой.",
  };

  function RegisterScreen() {
    const [theme, setTheme] = useState("dark");
    const [login, setLogin] = useState("");
    const [name, setName] = useState("");
    const [pass, setPass] = useState("");
    const [pass2, setPass2] = useState("");
    const [err, setErr] = useState("");
    const [busy, setBusy] = useState(false);

    useEffect(() => {
      document.documentElement.setAttribute("data-theme", theme);
    }, [theme]);
    const toggle = () => setTheme(t => (t === "dark" ? "light" : "dark"));

    // Уже вошли — регистрация не нужна, сразу на главную.
    useEffect(() => {
      MeetUp.authMe().then(resp => {
        if (resp.ok && resp.body && resp.body.user) enterHome(resp.body.user);
      });
    }, []);

    function enterHome(user) {
      MeetUp.saveName(user.display_name);
      location.href = "home.html";
    }

    async function submit() {
      const loginNorm = login.trim().toLowerCase();
      if (!loginNorm || !name.trim() || !pass) { setErr("Заполните все поля."); return; }
      if (!/^[a-z0-9_.-]{3,32}$/.test(loginNorm)) { setErr(ERRORS.invalid_login); return; }
      if (pass.length < 8) { setErr(ERRORS.weak_password); return; }
      if (pass !== pass2) { setErr("Пароли не совпадают."); return; }

      setErr("");
      setBusy(true);
      const resp = await MeetUp.authRegister(loginNorm, pass, name.trim());
      if (resp.ok && resp.body && resp.body.user) { enterHome(resp.body.user); return; }
      setBusy(false);
      const code = resp.body && resp.body.error;
      if (ERRORS[code]) setErr(ERRORS[code]);
      else if (resp.status === 0) setErr("Сервер недоступен. Попробуйте позже.");
      else setErr("Ошибка сервера (" + resp.status + ").");
    }

    return (
      <div className="page" style={{ background: "var(--bg)", color: "var(--text)", fontFamily: "var(--font-ui)" }}>
        <div className="topbar">
          <div className="wordmark">MeetUp</div>
          <span style={{ flex: 1 }} />
          <IconButton icon={theme === "dark" ? "sun" : "moon"} size="sm"
                      label="Сменить тему" onClick={toggle} />
        </div>

        <div className="stagewrap">
          <div className="stage">
            <div className="hero">
              <h1 className="hero-title">
                Свой аккаунт —<br />своя <span style={{ color: "var(--accent-ink)" }}>комната</span>
              </h1>
              <p className="hero-sub">
                Логин и пароль — для входа. Отображаемое имя увидят собеседники,
                его можно поменять в любой момент.
              </p>
              <div className="hero-meta">
                <span className="hero-dot" />
                Открытая видеосвязь без установки
              </div>
            </div>

            <div className="cardwrap">
              <Card elevated width="100%">
                <Field label="Логин" htmlFor="login">
                  <Input id="login" value={login} autoComplete="username" maxLength={32}
                         placeholder="anna"
                         onChange={(e) => { setLogin(e.target.value); setErr(""); }} />
                </Field>

                <Field label="Отображаемое имя" htmlFor="name" style={{ marginTop: 18 }}>
                  <Input id="name" value={name} autoComplete="name" maxLength={40}
                         placeholder="Анна"
                         onChange={(e) => { setName(e.target.value); setErr(""); }} />
                </Field>

                <Field label="Пароль" htmlFor="pass" style={{ marginTop: 18 }}
                       hint="Минимум 8 символов">
                  <Input id="pass" type="password" value={pass} autoComplete="new-password"
                         placeholder="••••••••" maxLength={128}
                         onChange={(e) => { setPass(e.target.value); setErr(""); }} />
                </Field>

                <Field label="Повторите пароль" htmlFor="pass2" style={{ marginTop: 18 }}>
                  <Input id="pass2" type="password" value={pass2} autoComplete="new-password"
                         placeholder="••••••••" maxLength={128}
                         onChange={(e) => { setPass2(e.target.value); setErr(""); }}
                         onKeyDown={(e) => e.key === "Enter" && submit()} />
                </Field>

                <Button variant="primary" block iconRight="arrow-right" disabled={busy}
                        style={{ marginTop: 20 }} onClick={submit}>
                  Создать аккаунт
                </Button>

                <div className="signin">
                  Уже есть аккаунт? <a href="login.html">Войти</a>
                </div>

                <div className="msg" style={{ color: err ? "var(--danger)" : "var(--text-faint)" }}>
                  {err || "Пароль хранится только в виде хеша."}
                </div>
              </Card>
            </div>
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<RegisterScreen />);
</script>

</body>
</html>
