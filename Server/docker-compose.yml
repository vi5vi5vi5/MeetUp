# MeetUp: приложение + nginx-терминатор TLS.
# Запуск/обновление:  docker compose up -d --build
#
# Наружу опубликован только proxy: 443 — https и wss, 80 — редирект на https.
# Порты приложения (80, 9000) наружу не торчат — до них можно достучаться
# только через nginx. Переопределить порты хоста:
#   HTTPS_PORT=8443 HTTP_PORT=8081 docker compose up -d --build
#
# TLS: без DOMAIN — самоподписанный сертификат (как раньше). С доменом —
# Let's Encrypt по HTTP-01 с автопродлением:
#   DOMAIN=meetup.linkpc.net LETSENCRYPT_EMAIL=you@mail.com docker compose up -d --build
# В режиме с доменом HTTP_PORT переопределять нельзя: challenge всегда идёт
# на внешний порт 80.

services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      # Всё персистентное (SQLite) — в ./mount на хосте: переживает
      # пересборку образа и down/up; папка в .gitignore, git pull её
      # не трогает. Docker создаёт её сам при первом запуске.
      - ./mount:/app/mount

  proxy:
    build: proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      # DOMAIN задан → Let's Encrypt по HTTP-01; пуст → самоподписанный.
      - DOMAIN=${DOMAIN:-}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}
    volumes:
      - certs:/etc/nginx/certs
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - app

volumes:
  # Самоподписанный сертификат + симлинки live/: живут между запусками.
  certs:
  # Сертификаты Let's Encrypt и аккаунт certbot. Не удалять — иначе повторный
  # запрос упрётся в rate limit.
  letsencrypt:
